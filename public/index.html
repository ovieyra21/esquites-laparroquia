<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌽 Esquites La Parroquia - POS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f5a623;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { color: #f5a623; font-size: 1.5rem; }
        .header .subtitle { color: #888; font-size: 0.8rem; }
        .header .nav a {
            color: #aaa;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .header .nav a:hover, .header .nav a.active {
            background: #f5a623;
            color: #1a1a2e;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #2a2a4e;
            margin-bottom: 20px;
        }
        .card-title {
            color: #f5a623;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #2a2a4e;
            padding-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .product-item {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .product-item:hover {
            border-color: #f5a623;
            transform: translateY(-2px);
        }
        .product-item .name { font-weight: bold; }
        .product-item .price { color: #f5a623; font-size: 1.2rem; font-weight: bold; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a4e;
        }
        .cart-item .qty { display: flex; align-items: center; gap: 10px; }
        .cart-item .qty button {
            background: #2a2a4e;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
        }
        .cart-item .qty button:hover { background: #f5a623; color: #1a1a2e; }
        .btn {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #1a1a2e;
        }
        .btn-success { background: #51cf66; }
        .btn-danger { background: #ff6b6b; }
        .btn-gold { background: #f5a623; }
        .btn:hover { transform: scale(1.03); }
        .btn-block { width: 100%; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid #f5a623;
            z-index: 999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left-color: #51cf66; }
        .toast.error { border-left-color: #ff6b6b; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading { text-align: center; padding: 40px; color: #888; }
        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #2a2a4e;
            border-top-color: #f5a623;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pos-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) {
            .pos-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <h1>🌽 Esquites La Parroquia</h1>
            <span class="subtitle">El sabor que nos une</span>
        </div>
        <nav class="nav">
            <a href="#" class="active" onclick="loadPage('pos')">🛒 POS</a>
            <a href="#" onclick="loadPage('caja')">💰 Caja</a>
        </nav>
    </header>

    <div class="container">
        <!-- ===== Página POS ===== -->
        <div id="page-pos">
            <div class="pos-layout">
                <div class="card">
                    <div class="card-title">📦 Productos</div>
                    <div id="product-list" class="grid">
                        <div class="loading"><div class="spinner"></div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">
                        🛒 Carrito
                        <span style="float:right;font-size:0.8rem;color:#888;" id="cart-count">0</span>
                    </div>
                    <div id="cart-items">
                        <p style="color:#888;text-align:center;">Carrito vacío</p>
                    </div>
                    <div style="margin-top:15px;border-top:1px solid #2a2a4e;padding-top:15px;">
                        <div style="display:flex;justify-content:space-between;font-size:1.2rem;font-weight:bold;">
                            <span>Total</span>
                            <span style="color:#f5a623;" id="cart-total">$0.00</span>
                        </div>
                        <div style="display:flex;gap:10px;margin-top:10px;">
                            <button class="btn btn-success" onclick="checkout()" style="flex:1;">💳 Cobrar</button>
                            <button class="btn btn-danger" onclick="clearCart()" style="flex:0.5;">🗑️</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">🧾 Ventas recientes</div>
                <div id="recent-sales">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- ===== Página Caja ===== -->
        <div id="page-caja" style="display:none;">
            <div class="card">
                <div class="card-title">💰 Estado de Caja</div>
                <div id="cash-content">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const API = 'http://localhost:3000';
        let products = [];
        let cart = [];

        function fmt(v) {
            return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);
        }

        function toast(msg, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = `toast ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        // ============================================================
        // NAVEGACIÓN
        // ============================================================
        function loadPage(page) {
            document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
            document.getElementById(`page-${page}`).style.display = 'block';
            document.querySelectorAll('.nav a').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            if (page === 'caja') loadCash();
        }

        // ============================================================
        // PRODUCTOS
        // ============================================================
        async function loadProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const res = await fetch(`${API}/api/products`);
                products = await res.json();
                if (!products || products.length === 0) {
                    container.innerHTML = '<p style="color:#888;text-align:center;">No hay productos</p>';
                    return;
                }
                container.innerHTML = products.map(p => `
                    <div class="product-item" onclick="addToCart('${p.id}')">
                        <div class="name">${p.name}</div>
                        <div class="price">${fmt(p.price)}</div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p style="color:#ff6b6b;">Error: ${e.message}</p>`;
            }
        }

        // ============================================================
        // CARRITO
        // ============================================================
        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            if (cart.length === 0) {
                container.innerHTML = '<p style="color:#888;text-align:center;">Carrito vacío</p>';
                totalEl.textContent = fmt(0);
                countEl.textContent = '0';
                return;
            }
            container.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <div class="qty">
                        <button onclick="updateQty(${i}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button onclick="updateQty(${i}, 1)">+</button>
                    </div>
                    <span>${fmt(item.price * item.qty)}</span>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            totalEl.textContent = fmt(total);
            countEl.textContent = cart.reduce((s, i) => s + i.qty, 0);
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if (!p) return toast('Producto no encontrado', 'error');
            const existing = cart.find(x => x.id === id);
            if (existing) { existing.qty++; }
            else { cart.push({ ...p, qty: 1 }); }
            renderCart();
            toast(`${p.name} agregado`);
        }

        function updateQty(i, delta) {
            if (cart[i].qty + delta <= 0) { cart.splice(i, 1); renderCart(); return; }
            cart[i].qty += delta;
            renderCart();
        }

        function clearCart() {
            cart = [];
            renderCart();
            toast('Carrito vaciado');
        }

        // ============================================================
        // VENTA (CHECKOUT)
        // ============================================================
        async function checkout() {
            if (cart.length === 0) return toast('Carrito vacío', 'error');
            const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
            try {
                // Verificar caja abierta
                const statusRes = await fetch(`${API}/api/cash/status`);
                const status = await statusRes.json();
                if (!status.open) {
                    toast('⚠️ Primero abre la caja', 'error');
                    return;
                }
                // Crear venta
                const sale = await fetch(`${API}/api/sales`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        total: total,
                        subtotal: total,
                        payment_method: 'efectivo',
                        cash_received: total,
                        change_amount: 0,
                        status: 'completada',
                        cancelled: false,
                        discount: 0
                    })
                });
                const saleData = await sale.json();
                // Crear items
                for (const item of cart) {
                    await fetch(`${API}/api/sale_items`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sale_id: saleData.id,
                            product_id: item.id,
                            product_name: item.name,
                            quantity: item.qty,
                            unit_price: item.price,
                            total: item.price * item.qty,
                            kds_item_status: 'completada'
                        })
                    });
                }
                // Imprimir
                const ticket = cart.map(i => `${i.qty}x ${i.name} = ${fmt(i.price * i.qty)}`).join('\n');
                await fetch(`${API}/api/print`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: ticket })
                });
                toast(`✅ Venta completada: ${fmt(total)}`, 'success');
                cart = [];
                renderCart();
                loadSales();
            } catch (e) {
                toast(`❌ Error: ${e.message}`, 'error');
            }
        }

        // ============================================================
        // VENTAS RECIENTES
        // ============================================================
        async function loadSales() {
            const container = document.getElementById('recent-sales');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const res = await fetch(`${API}/api/sales?limit=10`);
                const sales = await res.json();
                if (!sales || sales.length === 0) {
                    container.innerHTML = '<p style="color:#888;text-align:center;">Sin ventas</p>';
                    return;
                }
                container.innerHTML = sales.map(s => `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2a2a4e;">
                        <span>#${(s.id || '').slice(0, 8)}</span>
                        <span>${s.created_at ? new Date(s.created_at).toLocaleString() : ''}</span>
                        <span style="color:#f5a623;font-weight:bold;">${fmt(s.total)}</span>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<p style="color:#ff6b6b;">Error: ${e.message}</p>`;
            }
        }

        // ============================================================
        // CAJA
        // ============================================================
        async function loadCash() {
            const container = document.getElementById('cash-content');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const statusRes = await fetch(`${API}/api/cash/status`);
                const status = await statusRes.json();
                if (!status.open) {
                    container.innerHTML = `
                        <p style="text-align:center;padding:20px;">
                            🔒 No hay caja abierta
                            <br><br>
                            <button class="btn btn-gold" onclick="openCash()">Abrir Caja</button>
                        </p>
                    `;
                    return;
                }
                const currentRes = await fetch(`${API}/api/cash/current`);
                const data = await currentRes.json();
                const reg = data.register;
                const summary = data.summary || {};
                const totalSales = (summary.sales_cash || 0) + (summary.sales_card || 0) + (summary.sales_transfer || 0);
                container.innerHTML = `
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
                        <div style="background:#1a1a2e;padding:15px;border-radius:10px;text-align:center;">
                            <div style="color:#f5a623;font-size:1.5rem;">${fmt(reg.opening_amount)}</div>
                            <div style="color:#888;font-size:0.7rem;">Fondo inicial</div>
                        </div>
                        <div style="background:#1a1a2e;padding:15px;border-radius:10px;text-align:center;">
                            <div style="color:#51cf66;font-size:1.5rem;">${fmt(totalSales)}</div>
                            <div style="color:#888;font-size:0.7rem;">Total vendido</div>
                        </div>
                        <div style="background:#1a1a2e;padding:15px;border-radius:10px;text-align:center;">
                            <div style="color:#f5a623;font-size:1.5rem;">${summary.sales_count || 0}</div>
                            <div style="color:#888;font-size:0.7rem;">Tickets</div>
                        </div>
                    </div>
                    <div style="margin-top:15px;display:flex;gap:10px;">
                        <button class="btn btn-success" onclick="addMovement('entrada')">⬇️ Entrada</button>
                        <button class="btn btn-danger" onclick="addMovement('salida')">⬆️ Salida</button>
                        <button class="btn btn-gold" onclick="closeCash()">🔒 Cerrar</button>
                    </div>
                `;
            } catch (e) {
                container.innerHTML = `<p style="color:#ff6b6b;">Error: ${e.message}</p>`;
            }
        }

        async function openCash() {
            try {
                const res = await fetch(`${API}/api/cash/open`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ openingAmount: 200 })
                });
                await res.json();
                toast('✅ Caja abierta', 'success');
                loadCash();
            } catch (e) {
                toast(`❌ Error: ${e.message}`, 'error');
            }
        }

        async function addMovement(type) {
            const amount = prompt(`Ingresa el monto para ${type === 'entrada' ? 'ENTRADA' : 'SALIDA'}:`);
            if (!amount || isNaN(amount)) return;
            try {
                await fetch(`${API}/api/cash/movement`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: type,
                        amount: parseFloat(amount),
                        concept: prompt('Concepto:') || type
                    })
                });
                toast('✅ Movimiento registrado', 'success');
                loadCash();
            } catch (e) {
                toast(`❌ Error: ${e.message}`, 'error');
            }
        }

        async function closeCash() {
            const amount = prompt('Ingresa el monto real contado:');
            if (!amount || isNaN(amount)) return;
            try {
                const res = await fetch(`${API}/api/cash/close`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        realAmount: parseFloat(amount),
                        notes: prompt('Notas (opcional):') || 'Corte de caja'
                    })
                });
                const data = await res.json();
                toast(`✅ Caja cerrada - Diferencia: ${fmt(data.difference)}`, 'success');
                loadCash();
            } catch (e) {
                toast(`❌ Error: ${e.message}`, 'error');
            }
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            loadSales();
        });
    </script>
</body>
</html>
